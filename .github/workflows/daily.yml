name: Be Greedy daily check

on:
  schedule:
    # 21:30 UTC on weekdays — shortly after the US market close.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Send a test email now, ignoring threshold/cooldown"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: market-pulse
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Market Pulse
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Broadcast to the subscriber list only on the scheduled run. A manual
          # "Run workflow" sends a direct test email to EMAIL_TO instead, which
          # works with Resend's shared sender (no domain verification, no need
          # to be a contact in the Audience) — the most reliable way to test.
          RESEND_AUDIENCE_ID: ${{ github.event_name == 'schedule' && secrets.RESEND_AUDIENCE_ID || '' }}
          # Set the EMAIL_TO repo secret to your address to receive manual test
          # emails. (Kept as a secret, not hardcoded, so it's not public.)
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FORCE: ${{ inputs.force }}
        run: python -m market_pulse.main

      - name: Persist cooldown state
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "chore: update alert cooldown state [skip ci]"
            git push
          else
            echo "No state change — nothing to commit."
          fi
